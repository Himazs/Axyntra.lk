<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Axyntra — Site Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --p:       #6D28D9;
      --p2:      #7C3AED;
      --p3:      #8B5CF6;
      --p4:      #A78BFA;
      --bg:      #06030f;
      --bg2:     #0c0818;
      --bg3:     #120f20;
      --border:  rgba(109,40,217,0.3);
      --border2: rgba(109,40,217,0.14);
      --text:    #EDE9FE;
      --text2:   #C4B5FD;
      --text3:   #7C6FA0;
      --text4:   #4C4068;
      --white:   #F9F7FF;
      --glow:    rgba(109,40,217,0.45);

      --chrome-h: 56px;
      --toolbar-h: 64px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ══════════════════════
       TOP TOOLBAR
    ══════════════════════ */
    .toolbar {
      height: var(--toolbar-h);
      background: rgba(8,4,18,0.97);
      border-bottom: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      gap: 1rem;
      flex-shrink: 0;
      backdrop-filter: blur(20px);
      z-index: 100;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      color: var(--text3);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 0.4rem 0.85rem;
      border-radius: 50px;
      border: 1px solid var(--border2);
      transition: all 0.2s;
    }
    .back-btn:hover {
      color: var(--white);
      border-color: var(--border);
      background: rgba(109,40,217,0.1);
    }

    .toolbar-brand {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      background: linear-gradient(135deg, var(--white) 20%, var(--p4));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .toolbar-brand span {
      background: linear-gradient(135deg, var(--p3), var(--p4));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .preview-badge {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--p4);
      background: rgba(109,40,217,0.12);
      border: 1px solid var(--border2);
      border-radius: 50px;
      padding: 0.2rem 0.7rem;
    }

    /* ── DEVICE SWITCHER ── */
    .device-switcher {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      background: rgba(109,40,217,0.08);
      border: 1px solid var(--border2);
      border-radius: 50px;
      padding: 0.25rem;
    }

    .dev-btn {
      width: 34px;
      height: 30px;
      border-radius: 50px;
      border: none;
      background: transparent;
      color: var(--text4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .dev-btn:hover { color: var(--text2); }
    .dev-btn.active {
      background: linear-gradient(135deg, var(--p), var(--p2));
      color: white;
      box-shadow: 0 2px 12px var(--glow);
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .zoom-group {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      background: rgba(109,40,217,0.08);
      border: 1px solid var(--border2);
      border-radius: 50px;
      padding: 0.25rem 0.6rem;
      font-size: 0.72rem;
      color: var(--text3);
    }
    .zoom-btn {
      width: 22px;
      height: 22px;
      border: none;
      background: transparent;
      color: var(--text3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      border-radius: 50%;
      transition: color 0.2s;
    }
    .zoom-btn:hover { color: var(--p4); }
    #zoom-label { min-width: 36px; text-align: center; font-weight: 600; color: var(--text2); }

    .open-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: linear-gradient(135deg, var(--p), var(--p2));
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.78rem;
      padding: 0.5rem 1.1rem;
      border-radius: 50px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 4px 18px var(--glow);
    }
    .open-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px var(--glow);
    }

    /* ══════════════════════
       STAGE (contains the device frame + iframe)
    ══════════════════════ */
    .stage {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1.5rem 2.5rem;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(109,40,217,0.12) 0%, transparent 70%),
        var(--bg);
      position: relative;
    }

    /* subtle grid dots */
    .stage::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(109,40,217,0.18) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      opacity: 0.4;
    }

    /* ── DEVICE FRAME ── */
    .device-frame {
      position: relative;
      flex-shrink: 0;
      transition: all 0.45s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* ── DESKTOP FRAME ── */
    .device-frame.desktop {
      width: 100%;
      max-width: 1200px;
    }
    .device-frame.desktop .frame-shell {
      border-radius: 10px 10px 6px 6px;
      background: #1a1228;
      border: 1.5px solid rgba(109,40,217,0.35);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.6),
        0 24px 80px rgba(0,0,0,0.7),
        0 0 60px rgba(109,40,217,0.12);
      overflow: hidden;
    }
    .device-frame.desktop .frame-chrome {
      height: var(--chrome-h);
      background: #120d1e;
      border-bottom: 1px solid rgba(109,40,217,0.18);
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 0.75rem;
    }
    .chrome-dots {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .chrome-dots span {
      width: 11px; height: 11px;
      border-radius: 50%;
      display: block;
    }
    .chrome-dots span:nth-child(1) { background: #FF5F57; }
    .chrome-dots span:nth-child(2) { background: #FFBD2E; }
    .chrome-dots span:nth-child(3) { background: #28CA41; }

    .chrome-bar {
      flex: 1;
      height: 28px;
      background: rgba(109,40,217,0.1);
      border: 1px solid rgba(109,40,217,0.2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      padding: 0 0.75rem;
      gap: 0.5rem;
      font-size: 0.72rem;
      color: var(--text4);
      overflow: hidden;
    }
    .chrome-bar svg { flex-shrink: 0; }
    .chrome-url { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .chrome-actions {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .chrome-actions svg { opacity: 0.35; }

    .device-frame.desktop .frame-viewport {
      height: 72vh;
      position: relative;
      overflow: hidden;
    }

    /* ── TABLET FRAME ── */
    .device-frame.tablet {
      width: 768px;
      max-width: 95vw;
    }
    .device-frame.tablet .frame-shell {
      border-radius: 18px;
      background: #1a1228;
      border: 2.5px solid rgba(109,40,217,0.35);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.5),
        inset 0 0 0 4px #0e0a1a,
        0 30px 90px rgba(0,0,0,0.7),
        0 0 60px rgba(109,40,217,0.1);
      padding: 16px 10px;
      overflow: hidden;
    }
    .device-frame.tablet .frame-chrome { display: none; }
    .device-frame.tablet .tablet-cam {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }
    .device-frame.tablet .tablet-cam::before {
      content: '';
      width: 8px; height: 8px;
      background: #1e1830;
      border: 1px solid rgba(109,40,217,0.3);
      border-radius: 50%;
      display: block;
    }
    .device-frame.tablet .frame-viewport {
      height: 66vh;
      position: relative;
      overflow: hidden;
      border-radius: 6px;
    }
    .device-frame.tablet .tablet-home {
      display: flex;
      justify-content: center;
      margin-top: 10px;
    }
    .device-frame.tablet .tablet-home::before {
      content: '';
      width: 36px; height: 5px;
      background: rgba(109,40,217,0.25);
      border-radius: 3px;
      display: block;
    }

    /* ── MOBILE FRAME ── */
    .device-frame.mobile {
      width: 375px;
      max-width: 85vw;
    }
    .device-frame.mobile .frame-shell {
      border-radius: 44px;
      background: #1a1228;
      border: 2.5px solid rgba(109,40,217,0.4);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.5),
        inset 0 0 0 5px #0c0818,
        0 40px 100px rgba(0,0,0,0.75),
        0 0 70px rgba(109,40,217,0.12);
      padding: 18px 12px;
      overflow: hidden;
    }
    .device-frame.mobile .frame-chrome { display: none; }
    .device-frame.mobile .mobile-notch {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }
    .device-frame.mobile .mobile-notch::before {
      content: '';
      width: 100px; height: 26px;
      background: #0c0818;
      border-radius: 0 0 18px 18px;
      display: block;
      border: 1px solid rgba(109,40,217,0.2);
      border-top: none;
    }
    .device-frame.mobile .frame-viewport {
      height: 68vh;
      position: relative;
      overflow: hidden;
      border-radius: 4px;
    }
    .device-frame.mobile .mobile-home {
      display: flex;
      justify-content: center;
      margin-top: 12px;
    }
    .device-frame.mobile .mobile-home::before {
      content: '';
      width: 48px; height: 5px;
      background: rgba(109,40,217,0.3);
      border-radius: 3px;
      display: block;
    }

    /* ── IFRAME ── */
    .preview-iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #080412;
      transform-origin: top left;
    }

    /* ── LOADING OVERLAY ── */
    .iframe-loader {
      position: absolute;
      inset: 0;
      background: #080412;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 10;
      transition: opacity 0.4s;
    }
    .iframe-loader.hidden { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 48px; height: 48px;
      border: 2px solid rgba(109,40,217,0.2);
      border-top-color: var(--p3);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-txt {
      font-size: 0.75rem;
      color: var(--text4);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── STATUS BAR (bottom) ── */
    .status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 36px;
      background: rgba(6,3,15,0.96);
      border-top: 1px solid var(--border2);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1.5rem;
      font-size: 0.67rem;
      color: var(--text4);
      z-index: 200;
      backdrop-filter: blur(12px);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22C55E;
      animation: statusPulse 2.5s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes statusPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
      50%      { box-shadow: 0 0 0 5px rgba(34,197,94,0); }
    }
    .status-item { display: flex; align-items: center; gap: 0.45rem; }
    .status-sep { width: 1px; height: 14px; background: var(--border2); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .toolbar { padding: 0 1rem; }
      .toolbar-brand { display: none; }
      .preview-badge { display: none; }
      .zoom-group { display: none; }
      .stage { padding: 1.2rem 0.75rem 3rem; }
    }
    @media (max-width: 600px) {
      .open-btn .open-label { display: none; }
    }
  </style>
</head>
<body>

<!-- TOOLBAR -->
<header class="toolbar">
  <div class="toolbar-left">
    <a href="index.html" class="back-btn">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M8 2L4 6.5 8 11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      Back
    </a>
    <div class="toolbar-brand">Axyntra<span>.</span></div>
    <div class="preview-badge">Client Preview</div>
  </div>

  <!-- DEVICE SWITCHER -->
  <div class="device-switcher" role="group" aria-label="Device preview">
    <!-- Desktop -->
    <button class="dev-btn active" id="btn-desktop" title="Desktop" onclick="setDevice('desktop')">
      <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
        <rect x="1" y="1" width="16" height="10" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
        <path d="M6 13h6M9 11v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </button>
    <!-- Tablet -->
    <button class="dev-btn" id="btn-tablet" title="Tablet" onclick="setDevice('tablet')">
      <svg width="13" height="16" viewBox="0 0 13 16" fill="none">
        <rect x="1" y="1" width="11" height="14" rx="2" stroke="currentColor" stroke-width="1.3"/>
        <circle cx="6.5" cy="13" r="0.8" fill="currentColor"/>
      </svg>
    </button>
    <!-- Mobile -->
    <button class="dev-btn" id="btn-mobile" title="Mobile" onclick="setDevice('mobile')">
      <svg width="10" height="16" viewBox="0 0 10 16" fill="none">
        <rect x="1" y="1" width="8" height="14" rx="2" stroke="currentColor" stroke-width="1.3"/>
        <circle cx="5" cy="13.2" r="0.75" fill="currentColor"/>
        <path d="M3.5 3h3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div class="toolbar-right">
    <!-- ZOOM CONTROL -->
    <div class="zoom-group">
      <button class="zoom-btn" title="Zoom out" onclick="adjustZoom(-10)">−</button>
      <span id="zoom-label">100%</span>
      <button class="zoom-btn" title="Zoom in" onclick="adjustZoom(10)">+</button>
    </div>

    <!-- OPEN IN NEW TAB -->
    <a href="index.html" target="_blank" rel="noopener" class="open-btn">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M7.5 1H12M12 1V5.5M12 1L5.5 7.5" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M6 2.5H2a1 1 0 00-1 1V11a1 1 0 001 1h7.5a1 1 0 001-1V7.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <span class="open-label">Open Full Site</span>
    </a>
  </div>
</header>

<!-- STAGE -->
<main class="stage" id="stage">
  <div class="device-frame desktop" id="deviceFrame">
    <!-- Desktop shell -->
    <div class="frame-shell">
      <div class="frame-chrome">
        <div class="chrome-dots">
          <span></span><span></span><span></span>
        </div>
        <div class="chrome-bar">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
            <circle cx="5.5" cy="5.5" r="4.5" stroke="currentColor" stroke-width="1.1" opacity="0.5"/>
            <path d="M8.5 8.5l1.5 1.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" opacity="0.5"/>
          </svg>
          <span class="chrome-url">axyntra.lk · Axyntra — Official Digital Agency Sri Lanka</span>
        </div>
        <div class="chrome-actions">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M7 2l5 5-5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.3"/><circle cx="7" cy="7" r="1.5" fill="currentColor" opacity="0.5"/></svg>
        </div>
      </div>

      <!-- tablet / mobile extras injected by JS -->
      <div id="topExtras"></div>

      <div class="frame-viewport" id="viewport">
        <div class="iframe-loader" id="iframeLoader">
          <div class="loader-ring"></div>
          <div class="loader-txt">Loading preview…</div>
        </div>
        <iframe
          id="previewFrame"
          class="preview-iframe"
          src="index.html"
          title="Axyntra website preview"
          sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
          loading="eager"
        ></iframe>
      </div>

      <div id="bottomExtras"></div>
    </div>
  </div>
</main>

<!-- STATUS BAR -->
<div class="status-bar">
  <div class="status-item">
    <div class="status-dot"></div>
    <span>Live Preview</span>
  </div>
  <div class="status-sep"></div>
  <div class="status-item" id="status-device">
    <span>Desktop · 1200px</span>
  </div>
  <div class="status-sep"></div>
  <div class="status-item">
    <span>axyntra.lk</span>
  </div>
</div>

<script>
/* ────────────────────────────
   STATE
──────────────────────────── */
let currentDevice = 'desktop';
let zoomLevel = 100;

const frame        = document.getElementById('deviceFrame');
const previewFrame = document.getElementById('previewFrame');
const iframeLoader = document.getElementById('iframeLoader');
const topExtras    = document.getElementById('topExtras');
const bottomExtras = document.getElementById('bottomExtras');
const statusDevice = document.getElementById('status-device');
const zoomLabel    = document.getElementById('zoom-label');

/* ────────────────────────────
   IFRAME LOAD
──────────────────────────── */
previewFrame.addEventListener('load', () => {
  setTimeout(() => iframeLoader.classList.add('hidden'), 300);
});

/* ────────────────────────────
   DEVICE CONFIG
──────────────────────────── */
const DEVICES = {
  desktop: {
    frameClass: 'desktop',
    statusLabel: 'Desktop · 1200px',
    topHTML: '',
    bottomHTML: '',
  },
  tablet: {
    frameClass: 'tablet',
    statusLabel: 'Tablet · 768px',
    topHTML: '<div class="tablet-cam"></div>',
    bottomHTML: '<div class="tablet-home"></div>',
  },
  mobile: {
    frameClass: 'mobile',
    statusLabel: 'Mobile · 375px',
    topHTML: '<div class="mobile-notch"></div>',
    bottomHTML: '<div class="mobile-home"></div>',
  },
};

function setDevice(device) {
  currentDevice = device;
  const cfg = DEVICES[device];

  // Swap frame classes
  frame.className = 'device-frame ' + cfg.frameClass;

  // Show/hide chrome bar
  const chrome = frame.querySelector('.frame-chrome');
  if (chrome) chrome.style.display = device === 'desktop' ? '' : 'none';

  // Inject top/bottom extras
  topExtras.innerHTML    = cfg.topHTML;
  bottomExtras.innerHTML = cfg.bottomHTML;

  // Update active button
  document.querySelectorAll('.dev-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + device).classList.add('active');

  // Update status bar
  statusDevice.querySelector('span').textContent = cfg.statusLabel;

  // Apply current zoom
  applyZoom();
}

/* ────────────────────────────
   ZOOM
──────────────────────────── */
function applyZoom() {
  zoomLabel.textContent = zoomLevel + '%';
  const scale = zoomLevel / 100;
  const viewport = document.getElementById('viewport');

  // Scale the iframe inside viewport
  previewFrame.style.transform = `scale(${scale})`;
  previewFrame.style.width  = (100 / scale) + '%';
  previewFrame.style.height = (100 / scale) + '%';
  previewFrame.style.transformOrigin = 'top left';
}

function adjustZoom(delta) {
  zoomLevel = Math.min(150, Math.max(40, zoomLevel + delta));
  applyZoom();
}

/* ────────────────────────────
   KEYBOARD SHORTCUTS
──────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === '1') setDevice('desktop');
  if (e.key === '2') setDevice('tablet');
  if (e.key === '3') setDevice('mobile');
  if (e.key === '+' || e.key === '=') adjustZoom(10);
  if (e.key === '-') adjustZoom(-10);
  if (e.key === '0') { zoomLevel = 100; applyZoom(); }
});

/* ────────────────────────────
   INIT
──────────────────────────── */
applyZoom();
</script>
</body>
</html>
